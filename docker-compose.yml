# =============================================================================
# Kavana Manufacturing v3 — Stack completo (producción local)
#
# Servicios:
#   db        → PostgreSQL 16 (datos multi-tenant con RLS)
#   redis     → Redis 7 (colas BullMQ)
#   backend   → API NestJS (:3001)
#   worker    → Procesador BullMQ (oee-recalc, report-export)
#   frontend  → Nginx sirviendo React SPA (:80)
#
# Iniciar:
#   docker compose up -d
#
# Observabilidad (opcional):
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: kavana-v3-db
    environment:
      POSTGRES_USER: kavana
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kavana_v3_password}
      POSTGRES_DB: kavana_v3
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kavana -d kavana_v3']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kavana-v3-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kavana-v3-backend
    ports:
      - '3001:3001'
    environment:
      PORT: '3001'
      DATABASE_URL: postgresql://kavana:***@db:5432/kavana_v3
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      METRICS_PORT: '9464'
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      ALLOW_MOCK_AUTH: ${ALLOW_MOCK_AUTH:-true}
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kavana-v3-worker
    command: ['node', 'dist/worker.js']
    environment:
      DATABASE_URL: postgresql://kavana:***@db:5432/kavana_v3
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: kavana-v3-frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  redis_data:
