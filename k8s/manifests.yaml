# =============================================================================
# Kavana Manufacturing — Kubernetes Deployment
#
# Manifiestos listos para producción en cualquier clúster k8s.
# Probado con: minikube, kind, GKE, EKS, AKS.
#
# Aplicar:
#   kubectl apply -f k8s/
# =============================================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: kavana-manufacturing
  labels:
    app.kubernetes.io/part-of: kavana-manufacturing

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: kavana-manufacturing
data:
  PORT: '3001'
  NODE_ENV: 'production'
  REDIS_HOST: 'redis'
  REDIS_PORT: '6379'
  METRICS_PORT: '9464'
  LLM_PROVIDER: 'nvidia'
  LLM_MODEL: 'nvidia/llama-3.1-nemotron-70b-instruct'

---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: kavana-manufacturing
  annotations:
    sealedsecrets.bitnami.com/managed: 'true'
type: Opaque
# ⚠️ NO guardar valores reales aquí — usar SealedSecrets o ExternalSecrets en producción.
# Ver k8s/secrets.example.yaml para el formato con placeholders.
# En desarrollo local: kubectl create secret generic backend-secrets --from-literal=...
stringData: {}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgdata
  namespace: kavana-manufacturing
spec:
  accessModes: ['ReadWriteOnce']
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: kavana-manufacturing
spec:
  accessModes: ['ReadWriteOnce']
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: kavana-manufacturing
  labels:
    app: db
    tier: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
        tier: data
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: 'kavana'
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              value: 'kavana_v3'
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            exec:
              command: ['pg_isready', '-U', 'kavana', '-d', 'kavana_v3']
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: pgdata

---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: kavana-manufacturing
spec:
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432
  clusterIP: None  # Headless — el backend conecta directo

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: kavana-manufacturing
  labels:
    app: redis
    tier: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        tier: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ['redis-cli', 'ping']
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: kavana-manufacturing
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: kavana-manufacturing
  labels:
    app: backend
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        tier: api
    spec:
      containers:
        - name: backend
          image: ghcr.io/kavanasystemsinfo-ui/kavana-manufacturing-backend:latest
          ports:
            - containerPort: 3001
              name: http
            - containerPort: 9464
              name: metrics
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: JWT_SECRET
            - name: NVIDIA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: NVIDIA_API_KEY
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: kavana-manufacturing
  labels:
    app: worker
    tier: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
        tier: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/kavanasystemsinfo-ui/kavana-manufacturing-backend:latest
          command: ['npx', 'tsx', 'src/worker.ts']
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: DATABASE_URL
            - name: REDIS_HOST
              value: 'redis'
            - name: REDIS_PORT
              value: '6379'
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: kavana-manufacturing
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 3001
      targetPort: 3001
    - name: metrics
      port: 9464
      targetPort: 9464

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-metrics
  namespace: kavana-manufacturing
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app: backend
  endpoints:
    - port: metrics
      interval: 15s
      path: /metrics
