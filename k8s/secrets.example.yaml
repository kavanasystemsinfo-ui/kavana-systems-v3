# =============================================================================
# Kubernetes Secrets — ejemplo para desarrollo local
#
# ⚠️ NUNCA guardar valores reales aquí ni commitearlos a git.
# En producción usar: SealedSecrets, ExternalSecrets, Vault, o AWS Secrets Manager.
#
# Uso en desarrollo:
#   cp k8s/secrets.example.yaml k8s/secrets.yaml
#   # Editar con valores reales
#   kubectl create secret generic backend-secrets -n kavana-manufacturing --from-literal=DATABASE_URL='postgresql://...'
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: kavana-manufacturing
type: Opaque
stringData:
  DATABASE_URL: 'postgresql://kavana:***@db:5432/kavana_v3'
  DB_PASSWORD: '***'
  JWT_SECRET: '***'
  NVIDIA_API_KEY: '***'
  OPENROUTER_API_KEY: '***'
