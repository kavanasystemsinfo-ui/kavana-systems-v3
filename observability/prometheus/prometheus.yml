global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'kavana-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:9464']
        labels:
          service: 'kavana-manufacturing'
          env: 'production'
      # Para desarrollo local (backend en el host, no en Docker):
      # - targets: ['localhost:9464']
